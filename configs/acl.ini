; Docs module ACL — the public docs surface is guest-allowed (everyone).
; Resource name follows the framework convention (Tiger_Controller_Plugin_Authorization
; resolves a module controller to "<Module>_<Controller>Controller").
[production]

acl.resources.docs_index_ctrl.resource = "Docs_IndexController"

acl.rules.docs_pub.role       = "guest"
acl.rules.docs_pub.resource   = "Docs_IndexController"
acl.rules.docs_pub.permission = "allow"

[staging : production]

[testing : production]

[development : production]
