; Docs module ACL. The public docs surface (Docs_IndexController) is guest-allowed
; (everyone); the admin settings screen + its /api service are admin+. Resource names follow
; the framework convention (Tiger_Controller_Plugin_Authorization resolves a module controller
; to "<Module>_<Controller>Controller"; a service to "<Module>_Service_<Name>").
[production]

; --- Public docs (everyone) ---
acl.resources.docs_index_ctrl.resource  = "Docs_IndexController"
acl.resources.docs_search_svc.resource  = "Docs_Service_Search"

acl.rules.docs_pub.role       = "guest"
acl.rules.docs_pub.resource   = "Docs_IndexController"
acl.rules.docs_pub.permission = "allow"

acl.rules.docs_search_pub.role       = "guest"
acl.rules.docs_search_pub.resource   = "Docs_Service_Search"
acl.rules.docs_search_pub.permission = "allow"

; --- Admin settings (admin+, like the other Settings pages) ---
acl.resources.docs_admin_ctrl.resource    = "Docs_AdminController"
acl.resources.docs_settings_svc.resource  = "Docs_Service_Settings"

acl.rules.docs_admin_ctrl.role       = "admin"
acl.rules.docs_admin_ctrl.resource   = "Docs_AdminController"
acl.rules.docs_admin_ctrl.permission = "allow"

acl.rules.docs_settings_svc.role       = "admin"
acl.rules.docs_settings_svc.resource   = "Docs_Service_Settings"
acl.rules.docs_settings_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
